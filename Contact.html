<!DOCTYPE html>
<html dir="rtl" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدخل التعريفي</title>
                     <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

                    <!-- WOW JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
 

</head>
<body>
    
    <section class="Contact">
        <div class="Contact_Data">
            <div class="Contact_Info">
                <h2>تواصل معنا</h2>
                <h3>نسعد بتواصلكم معنا فى أى وقت</h3>
            </div>
            <div class="Contact_Hours">
                <div class="Contact_Information">
                    <h2 class="wow animate__animated animate__fadeInDown" data-wow-delay=".5s">معلومات التواصل</h2>
                    <div ><img src="assets/images/Location (3).svg" > <h5 class="wow animate__animated animate__fadeInUp" data-wow-delay="1s">مكان - دولة - مبنى</h5></div>
                    <div><img src="assets/images/Email (4).svg" > <h5 class="wow animate__animated animate__fadeInUp" data-wow-delay="1.3s"> info.Kuwait@gmail.com</h5></div>
                    <div><img src="assets/images/Vector (11).svg" > <h5 class="wow animate__animated animate__fadeInUp" data-wow-delay="1.6s">+(000) 000 000 000</h5></div>
                    <div><img src="assets/images/whatsapp (1).svg" > <h5 class="wow animate__animated animate__fadeInUp" data-wow-delay="1.9s">+(000) 000 000 000</h5></div>
                </div>
                <div class="working_Hours">
                    <h2 class="wow animate__animated animate__fadeInDown" data-wow-delay=".5s">ساعات العمل</h2>
                    <p class="wow animate__animated animate__fadeInUp" data-wow-delay="1s">من الأحد إلى الخميس من 7:30 صباحًا إلى 2:00 ظهرًا</p>
                </div>
            </div>
            <div class="Contact_Form">
                <h2>تواصل معنا</h2>
              <div>
                <form action="#">
                    <div class="Contact_Form_In">
                        <input type="text" placeholder="الإسم">
                        <input type="tel" placeholder="رقم الهاتف">
                    </div>
                <div><input type="email" placeholder="البريد الالكتروني"></div>
                <div ><input class="Contact_Form_Of" type="text" placeholder=" رسالتك"></div>
                 <button type="submit"> ارسال </button>
            </form>
             </div>
             <div class="Social_Networking">
                <div>
                    <h3>تابعنا على وسائل التواصل الاجتماعي</h3>
                </div>
                <div>
                <a class="wow animate__animated animate__zoomInLeft" data-wow-delay=".5s" href="#"><img src="assets/images/instagram.svg"></a>
                <a class="wow animate__animated animate__zoomInLeft" data-wow-delay=".8s" href="#"><img src="assets/images/youtube.svg"></a>
                <a class="wow animate__animated animate__zoomInLeft" data-wow-delay="1.1s" href="#"><img src="assets/images/x.svg"></a>
                <a class="wow animate__animated animate__zoomInLeft" data-wow-delay="1.4s" href="#"><img src="assets/images/Facebook.svg"></a>
                </div>
             </div>
            
        
        </div>
    </section>
        


    <!-- ######## -->


    <script> new WOW().init(); </script>
</body>
</html>
